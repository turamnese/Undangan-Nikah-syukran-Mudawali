<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#6f866f;
color:white;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
padding:30px;
}

.card{
background:white;
color:#333;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
font-family:'Playfair Display',serif;
color:#6f866f;
font-size:40px;
}

button{
padding:14px 30px;
border:none;
background:#d4af37;
border-radius:30px;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.section{
margin-top:40px;
}

.gallery img{
width:140px;
border-radius:10px;
margin:5px;
}

.flower{
position:fixed;
top:-20px;
font-size:18px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

</style>

</head>

<body>

<audio id="musik" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9b1c62b8c2.mp3">
</audio>


<div class="container">

<div class="card" id="cover">

<p id="guest"></p>

<h1>The Wedding Of</h1>

<h2>Syukran Mudawali</h2>

<p>&</p>

<h2>Nadia Putri Balqis</h2>

<p>03 April 2026</p>

<button onclick="bukaUndangan()">Buka Undangan</button>

</div>


<div id="isiUndangan" style="display:none;margin-top:30px">

<div class="card section">

<h2>Akad Nikah</h2>

<p>Jum'at, 03 April 2026</p>

<p>09:00 WIB</p>


<p>Mesjid Habib Chiek Kajhu</p>

<p>Kec. Baitussalam, Kab. Aceh Besar</p>

</div>


<div class="card section">

<h2>Menuju Hari Bahagia</h2>

<p id="countdown"></p>

</div>


<div class="card section">

<h2>Galeri</h2>

<div class="gallery">

<img src="https://picsum.photos/200/200?1">
<img src="https://picsum.photos/200/200?2">
<img src="https://picsum.photos/200/200?3">

</div>

</div>


<div class="card section">

<h2>Lokasi</h2>

<a href="https://maps.google.com/?q=Banda+Aceh" target="_blank">

<button>Lihat Lokasi</button>

</a>

</div>

</div>

</div>


<script>

function bukaUndangan(){

document.getElementById("cover").style.display="none";

document.getElementById("isiUndangan").style.display="block";

document.getElementById("musik").play();

}

const tanggalNikah = new Date("April 3, 2026 09:00:00").getTime();

setInterval(function(){

let sekarang = new Date().getTime();

let jarak = tanggalNikah - sekarang;

let hari = Math.floor(jarak/(1000*60*60*24));

let jam = Math.floor((jarak%(1000*60*60*24))/(1000*60*60));

let menit = Math.floor((jarak%(1000*60*60))/(1000*60));

let detik = Math.floor((jarak%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
hari+" Hari "+jam+" Jam "+menit+" Menit "+detik+" Detik";

},1000);


function bunga(){

const f=document.createElement("div");

f.classList.add("flower");

f.innerHTML="🍁🍂";

f.style.left=Math.random()*100+"vw";

f.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(f);

setTimeout(()=>{f.remove()},10000);

}

setInterval(bunga,800);


const params=new URLSearchParams(window.location.search);

const nama=params.get("to");

if(nama){

document.getElementById("guest").innerHTML="Kepada Yth : "+nama;

}

</script>

</body>
</html>
