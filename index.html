<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
body{
font-family:'Poppins',sans-serif;
background:#6f866f;
color:white;
text-align:center;
padding:50px;
margin:0;
}

.card{
background:white;
color:#333;
padding:40px;
border-radius:20px;
max-width:520px;
margin:auto;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}
  
h1{
font-family:'Playfair Display',serif;
color:#6f866f;
font-size:40px;
}
  
button{
padding:12px 28px;
border:none;
background:#d4af37;
border-radius:30px;
cursor:pointer;
font-weight:bold;
font-size:16px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}
  
.flower{
position:fixed;
top:-20px;
font-size:18px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

</style>

</head>

<script>

function buatBunga(){

const bunga = document.createElement("div");

bunga.classList.add("flower");

bunga.innerHTML = "🌸";

bunga.style.left = Math.random()*100 + "vw";

bunga.style.animationDuration = (Math.random()*5+5) + "s";

document.body.appendChild(bunga);

setTimeout(()=>{
bunga.remove();
},10000);

}

setInterval(buatBunga,800);

</script>
<body>

<div class="card" id="cover">
<div id="undangan" style="display:none; margin-top:40px;">

<h2>Akad Nikah</h2>
<p>Jum'at, 03 April 2026</p>
<p>09:00 WIB</p>


<p>Mesjid Habib Chik Kajhu Kec. Baitussalam</p>
<p>Aceh Besar</p>

</div>
<h1>The Wedding Of</h1>

<h2>Syukran Mudawali</h2>
<p>&</p>
<h2>Nadia Putri Balqis</h2>

<p>03 April 2026</p>

<p>Kajhu,Baitussalam,Aceh Besar</p>
<h2>Menuju Hari Bahagia</h2>

<p id="countdown"></p>
  <script>

const tanggalNikah = new Date("April 3, 2026 09:00:00").getTime();

setInterval(function(){

let sekarang = new Date().getTime();

let jarak = tanggalNikah - sekarang;

let hari = Math.floor(jarak / (1000*60*60*24));
let jam = Math.floor((jarak % (1000*60*60*24)) / (1000*60*60));
let menit = Math.floor((jarak % (1000*60*60)) / (1000*60));
let detik = Math.floor((jarak % (1000*60)) / 1000);

document.getElementById("countdown").innerHTML =
hari + " Hari " + jam + " Jam " + menit + " Menit " + detik + " Detik";

},1000);

  </script>
<button onclick="bukaUndangan()">Buka Undangan</button>
<audio id="musik" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9b1c62b8c2.mp3">
</audio>
</div>

</body>
<script>
function bukaUndangan(){
  alert("Selamat datang di undangan pernikahan kami 💍");

  const musik = document.getElementById("musik");
  if (musik) {
    musik.play().catch(() => {
      console.log("Autoplay diblokir, klik lagi untuk memutar musik.");
    });
  }
}
</script>
</html>
